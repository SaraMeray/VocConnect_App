<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Red Oak VocConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --dkblue:#00145B; --blue:#002D74; --transblue:rgba(0,45,116,.8);
  --ltblue:#AED8FB; --xltblue:#D7EBFD; --medgreen:#70A300; --green:#80BC00;
  --ltgreen:#80BF3F; --xltgreen:#F2F8E5; --orange:#F3B151; --gray:#595959;
  --xltgray:#F7F7F7; --white:#FFFFFF;
  --base:'Lato',Arial,Helvetica,sans-serif; --head:'Bebas Neue',Arial,sans-serif;
  --shadow:0 1px 3px rgba(0,20,91,.08),0 6px 20px rgba(0,20,91,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--base);color:var(--gray);background:var(--xltgray);
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--base);cursor:pointer;border:none;background:none}
h1,h2,h3{margin:0;color:var(--dkblue)}
.head{font-family:var(--head);letter-spacing:.5px;font-weight:400}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:30;background:var(--dkblue);color:var(--white);
  display:flex;align-items:center;gap:12px;padding:10px clamp(14px,4vw,28px);
  box-shadow:0 2px 10px rgba(0,20,91,.25)}
.brand{font-family:var(--head);font-size:24px;letter-spacing:1px;line-height:1;color:#fff;
  display:flex;align-items:baseline;gap:9px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block}
.brand small{font-family:var(--base);font-weight:700;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ltblue)}
.spacer{flex:1}
.iconbtn{color:var(--ltblue);font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px}
.iconbtn:hover{background:rgba(255,255,255,.1);color:#fff}
.user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);
  padding:6px 12px 6px 6px;border-radius:999px;font-size:13px;font-weight:700;color:#fff}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--green);color:var(--dkblue);
  display:grid;place-items:center;font-weight:900;font-size:13px}

/* ---------- layout ---------- */
.wrap{max-width:920px;margin:0 auto;padding:clamp(16px,4vw,30px) clamp(14px,4vw,28px) 120px}
.demo-banner{background:var(--xltgreen);border:1px solid #cfe3a8;color:#4d6b16;
  border-radius:11px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:20px;
  display:flex;gap:9px;align-items:center}
.demo-banner b{color:var(--medgreen)}
.crumbs{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;font-weight:700}
.crumbs .c{color:var(--blue);background:var(--xltblue);padding:5px 11px;border-radius:8px;
  display:inline-flex;align-items:center;gap:6px}
.crumbs .c.muted{color:var(--gray);background:#ececec}
.crumbs .sep{color:#b9c4d6}
.crumbs button.c{cursor:pointer}
.crumbs button.c:hover{background:var(--ltblue)}

.screen-title{font-family:var(--head);font-size:clamp(30px,5vw,42px);letter-spacing:.5px;
  line-height:1;margin:6px 0 4px}
.screen-sub{font-size:15px;color:var(--gray);margin:0 0 22px}

.search{width:100%;padding:13px 16px;border:1.5px solid #d4ddea;border-radius:11px;
  font-size:16px;font-family:var(--base);color:var(--dkblue);background:#fff;margin-bottom:20px}
.search:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--xltblue)}

/* ---------- card grids ---------- */
.grid{display:grid;gap:13px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.card{background:#fff;border:1.5px solid #e7edf5;border-radius:14px;padding:16px 17px;
  text-align:left;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
  display:flex;flex-direction:column;gap:6px;min-height:96px}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--ltblue)}
.card:active{transform:translateY(0)}
.card .name{font-family:var(--head);font-size:24px;letter-spacing:.4px;color:var(--dkblue);line-height:1.05}
.card .meta{font-size:12.5px;font-weight:700;color:var(--gray)}
.card .tag{align-self:flex-start;margin-top:auto;font-size:11px;font-weight:900;letter-spacing:.06em;
  text-transform:uppercase;padding:4px 9px;border-radius:7px}
.tag.blue{background:var(--xltblue);color:var(--blue)}
.tag.green{background:var(--xltgreen);color:var(--medgreen)}
.tag.multi{background:var(--orange);color:#5a3c0d}
.avatar-lg{width:38px;height:38px;border-radius:50%;background:var(--blue);color:#fff;
  display:grid;place-items:center;font-weight:900;font-size:15px;font-family:var(--base)}
.student-card{flex-direction:row;align-items:center;gap:13px;min-height:0}
.student-card .name{font-family:var(--base);font-weight:900;font-size:17px;color:var(--dkblue)}

/* ---------- rubric choice ---------- */
.rubric-opt{width:100%;text-align:left;background:#fff;border:1.5px solid #e7edf5;border-radius:14px;
  padding:18px 19px;display:flex;align-items:center;gap:15px;margin-bottom:12px;
  transition:border-color .12s,box-shadow .12s,transform .12s}
.rubric-opt:hover{border-color:var(--ltblue);box-shadow:var(--shadow);transform:translateY(-1px)}
.rubric-opt:disabled,.rubric-opt[disabled]{opacity:0.6;cursor:not-allowed;border-color:#e0e0e0}
.rubric-opt:disabled:hover,.rubric-opt[disabled]:hover{box-shadow:none;transform:none;border-color:#e0e0e0}
.rubric-opt .pill{font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;
  padding:5px 10px;border-radius:8px;white-space:nowrap}
.pill.primary{background:var(--xltgreen);color:var(--medgreen)}
.pill.secondary{background:#eef0f3;color:var(--gray)}
.pill.single{background:var(--xltblue);color:var(--blue)}
.rubric-opt .focus{font-family:var(--head);font-size:23px;letter-spacing:.4px;color:var(--dkblue);line-height:1.05}
.rubric-opt .sub{font-size:12.5px;font-weight:700;color:var(--gray)}
.rubric-opt .arrow{margin-left:auto;color:var(--ltblue);font-size:24px;font-weight:900}

/* ---------- scoring ---------- */
.context{position:sticky;top:48px;z-index:20;background:linear-gradient(180deg,#fff,#fbfcfe);
  border:1.5px solid #e7edf5;border-radius:14px;padding:14px 17px;margin-bottom:18px;box-shadow:var(--shadow)}
.context .ctitle{font-family:var(--head);font-size:25px;letter-spacing:.4px;color:var(--dkblue);line-height:1.05}
.context .crow{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:7px;font-size:13px;font-weight:700;color:var(--gray)}
.context .crow b{color:var(--blue)}

.skill{background:#fff;border:1.5px solid #e7edf5;border-radius:14px;padding:15px 16px 16px;margin-bottom:12px}
.skill .stext{font-weight:700;color:var(--dkblue);font-size:15.5px;margin-bottom:12px;display:flex;gap:9px}
.skill .snum{flex:none;width:23px;height:23px;border-radius:7px;background:var(--xltblue);color:var(--blue);
  font-size:12px;font-weight:900;display:grid;place-items:center;margin-top:1px}

.scale{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.lvl{border:1.5px solid #e2e8f1;border-radius:11px;background:#fff;padding:8px 4px 9px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:4px;min-height:92px;justify-content:flex-start;
  transition:transform .1s,box-shadow .12s,border-color .12s}
.lvl:hover{border-color:var(--ltblue)}
.lvl:active{transform:scale(.96)}
.lvl .ln{font-family:var(--head);font-size:26px;line-height:.85;color:var(--gray)}
.lvl .lp{font-size:11px;font-weight:900;letter-spacing:.01em;color:var(--dkblue);line-height:1.08}
.lvl .lsub{font-size:10px;font-weight:700;color:#8a93a1;line-height:1.08;margin-top:-1px}
.lvl.sel{border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(0,20,91,.18)}
.lvl.sel .ln,.lvl.sel .lp,.lvl.sel .lsub{color:#fff}
.lvl.sel.g0{background:var(--gray)}
.lvl.sel.g1{background:var(--ltblue)} .lvl.sel.g1 .ln,.lvl.sel.g1 .lp,.lvl.sel.g1 .lsub{color:var(--dkblue)}
.lvl.sel.g2{background:var(--blue)}
.lvl.sel.g3{background:var(--ltgreen)} .lvl.sel.g3 .ln,.lvl.sel.g3 .lp,.lvl.sel.g3 .lsub{color:#26420a}
.lvl.sel.g4{background:var(--medgreen)}
.lvl.sel.g5{background:#5d8600}
.scale.naoff{opacity:.35;pointer-events:none;filter:grayscale(.6)}
.skiprow{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:10px}
.skiprow .nahint{font-size:11.5px;font-weight:700;color:var(--orange);margin-right:auto}
.skip{font-size:12.5px;font-weight:900;letter-spacing:.02em;color:var(--gray);
  background:#f1f3f6;border:1.5px solid #e2e8f1;border-radius:9px;padding:8px 14px;
  display:inline-flex;align-items:center;gap:7px;transition:background .12s,color .12s,border-color .12s}
.skip:hover{border-color:var(--orange);color:#5a3c0d}
.skip.on{background:var(--orange);border-color:var(--orange);color:#4a2f08}
.skill.isna{background:#fffaf0;border-color:#f3d199}
.skill.isna .stext{color:#9aa4b2}

/* ---------- save bar ---------- */
.savebar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:#fff;
  border-top:1.5px solid #e7edf5;box-shadow:0 -4px 20px rgba(0,20,91,.07);
  padding:11px clamp(14px,4vw,28px);padding-bottom:calc(11px + env(safe-area-inset-bottom))}
.savebar .inner{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;gap:25px;flex-wrap:wrap;margin:0}
.tally{display:flex;gap:18px;font-size:13px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;color:#9aa4b2;flex-shrink:0}
.tally b{display:block;font-family:var(--head);font-size:29px;letter-spacing:.5px;color:var(--dkblue);line-height:.9;margin-top:2px}
.tally .done b{color:var(--medgreen)}
.btn{font-weight:900;font-size:16px;letter-spacing:.02em;border-radius:11px;padding:13px 22px;color:#fff}
.btn.save{background:var(--green);box-shadow:0 3px 10px rgba(128,188,0,.35)}
.btn.save:hover{background:var(--medgreen)} .btn.save:disabled{background:#c7cdd6;box-shadow:none;cursor:not-allowed}
.btn.ghost{background:var(--xltblue);color:var(--blue)} .btn.ghost:hover{background:var(--ltblue)}
.return-to-scoring-btn{width:100%;font-weight:900;font-size:16px;letter-spacing:.02em;border-radius:11px;
  padding:15px 22px;color:#fff;background:var(--dkblue);box-shadow:0 2px 8px rgba(0,20,91,.15);
  transition:background .12s,box-shadow .12s;display:inline-block;text-align:center}
.return-to-scoring-btn:hover{background:var(--blue);box-shadow:0 4px 12px rgba(0,20,91,.25)}

/* ---------- saved / recent ---------- */
.saved-hero{background:linear-gradient(135deg,var(--blue),var(--dkblue));color:#fff;border-radius:16px;
  padding:26px;text-align:center;margin-bottom:22px}
.saved-hero .check{width:54px;height:54px;border-radius:50%;background:var(--green);color:#fff;
  display:grid;place-items:center;font-size:30px;margin:0 auto 12px;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.saved-hero h2{color:#fff;font-family:var(--head);font-size:32px;letter-spacing:.5px}
.saved-hero p{margin:4px 0 0;color:var(--ltblue);font-weight:700;font-size:14px}
.mini{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.recent-row{display:flex;align-items:center;gap:13px;background:#fff;border:1.5px solid #e7edf5;
  border-radius:12px;padding:13px 15px;margin-bottom:10px}
.recent-row .rs{font-family:var(--head);font-size:26px;color:var(--medgreen);line-height:.9;width:54px;text-align:center}
.recent-row .ri{flex:1;min-width:0}
.recent-row .rt{font-weight:900;color:var(--dkblue);font-size:14.5px}
.recent-row .rm{font-size:12px;font-weight:700;color:var(--gray)}
.empty{text-align:center;color:#9aa4b2;font-weight:700;padding:40px 0}

.fade{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:520px){.lvl .lsub{display:none}.lvl{min-height:72px}.tally .sep{display:none}}

/* ---------- admin ---------- */
.admin-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.chk{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--gray);margin:-8px 0 16px;cursor:pointer}
.chk input{width:16px;height:16px;accent-color:var(--blue)}
.admin-list{display:flex;flex-direction:column;gap:9px}
.admin-row{display:flex;align-items:center;gap:13px;text-align:left;background:#fff;border:1.5px solid #e7edf5;
  border-radius:13px;padding:14px 16px;transition:border-color .12s,box-shadow .12s,transform .12s}
.admin-row:hover{border-color:var(--ltblue);box-shadow:var(--shadow);transform:translateY(-1px)}
.admin-row .ar-main{flex:1;min-width:0}
.admin-row .ar-name{font-family:var(--head);font-size:23px;letter-spacing:.4px;color:var(--dkblue);line-height:1.05}
.admin-row .ar-meta{font-size:12.5px;font-weight:700;color:var(--gray)}
.admin-row.arch{opacity:.6}
.admin-row .arrow{color:var(--ltblue);font-size:24px;font-weight:900}
.archtag{font-family:var(--base);font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;
  background:#eef0f3;color:var(--gray);padding:2px 7px;border-radius:6px;vertical-align:middle}
.linkbtn{background:none;border:none;color:var(--blue);font-weight:900;font-size:13.5px;cursor:pointer;padding:0}
.linkbtn:hover{text-decoration:underline}
.fld{display:block;margin-bottom:16px}
.fld .lbl{display:block;font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.in{width:100%;padding:12px 14px;border:1.5px solid #d4ddea;border-radius:10px;font-size:15.5px;
  font-family:var(--base);color:var(--dkblue);background:#fff}
.in:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--xltblue)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
.hint{font-size:12px;font-weight:700;color:#9aa4b2;margin-top:6px;display:block}
.title-prev{background:var(--xltblue);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;
  color:var(--blue);margin-bottom:18px}
.title-prev b{font-family:var(--head);font-size:18px;letter-spacing:.4px;color:var(--dkblue);font-weight:400}
.seg-wrap{display:inline-flex;border:1.5px solid #d4ddea;border-radius:10px;overflow:hidden}
.seg{padding:10px 18px;font-size:14px;font-weight:900;color:var(--gray);background:#fff;border-right:1.5px solid #d4ddea}
.seg:last-child{border-right:none}
.seg.on{background:var(--blue);color:#fff}
.section-h{font-family:var(--head);font-size:22px;letter-spacing:.4px;color:var(--dkblue);margin:22px 0 6px;
  display:flex;align-items:center;gap:9px}
.section-h span{font-family:var(--base);font-size:12px;font-weight:900;background:var(--xltblue);color:var(--blue);
  padding:3px 9px;border-radius:7px}
.rub-list{display:flex;flex-direction:column;gap:9px}
.rub-row{display:flex;align-items:center;gap:11px;background:#fff;border:1.5px solid #e7edf5;border-radius:12px;padding:11px 13px;flex-wrap:wrap}
.rub-row.arch{opacity:.6}
.rub-row .rr-main{flex:1;min-width:120px}
.rub-row .rr-focus{font-weight:900;color:var(--dkblue);font-size:14.5px}
.rub-row .rr-meta{font-size:12px;font-weight:700;color:var(--gray)}
.mini-btn{font-size:12.5px;font-weight:900;color:var(--blue);background:var(--xltblue);border-radius:8px;padding:8px 12px;transition:background .12s,color .12s}
.mini-btn:hover{background:var(--ltblue)}
.mini-btn:disabled{opacity:.35;cursor:not-allowed}
.mini-btn.danger{background:#fdeceb;color:#b3261e}
.mini-btn.danger:hover{background:#f9d9d6}
.sk-list{display:flex;flex-direction:column;gap:8px}
.sk-row{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1.5px solid #e7edf5;border-radius:11px;padding:10px 11px}
.sk-num{flex:none;width:24px;height:24px;border-radius:7px;background:var(--xltblue);color:var(--blue);
  font-size:12px;font-weight:900;display:grid;place-items:center;margin-top:6px}
.sk-in{flex:1;border:none;resize:none;font-family:var(--base);font-size:14.5px;color:var(--dkblue);
  padding:7px 6px;line-height:1.35;background:none;overflow:hidden}
.sk-in:focus{outline:none}
.sk-actions{display:flex;gap:5px;flex:none}
.sk-actions .mini-btn{padding:7px 10px}
.danger-zone{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px;padding-top:16px;border-top:1.5px solid #eef1f5}
.edit-actions{display:flex;gap:12px;margin-top:24px}
.edit-actions .btn{flex:1}
.err{display:none;background:#fdeceb;color:#b3261e;border-radius:9px;padding:10px 13px;font-size:13px;font-weight:700;margin-top:14px}

/* ---------- tabs, chips, roster, import ---------- */
.atabs{display:inline-flex;background:#eef2f7;border-radius:11px;padding:4px;gap:4px;margin-bottom:18px}
.atab{padding:9px 18px;border-radius:8px;font-size:14px;font-weight:900;color:var(--gray)}
.atab.on{background:#fff;color:var(--dkblue);box-shadow:0 1px 3px rgba(0,20,91,.12)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:-6px 0 18px}
.chip{padding:8px 15px;border-radius:999px;font-size:13px;font-weight:900;color:var(--blue);
  background:var(--xltblue);border:1.5px solid transparent}
.chip.on{background:var(--blue);color:#fff}
.roster-row{gap:12px}
.roster-row .avatar-lg{flex:none}
.drop{border:2px dashed #c3d0e2;border-radius:13px;background:var(--xltgray);padding:22px;text-align:center;margin-bottom:14px}
.drop input[type=file]{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden}
.drop-lbl{display:inline-block;font-weight:900;color:var(--blue);background:var(--xltblue);
  padding:11px 20px;border-radius:10px;cursor:pointer}
.drop-lbl:hover{background:var(--ltblue)}
.or{text-align:center;font-size:12px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#aeb6c2;margin:12px 0}
.tablewrap{overflow-x:auto;border:1.5px solid #e7edf5;border-radius:11px;margin-top:4px}
.ptable{width:100%;border-collapse:collapse;font-size:13.5px}
.ptable th{background:var(--xltblue);color:var(--blue);text-align:left;padding:9px 12px;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
.ptable td{padding:9px 12px;border-top:1px solid #eef1f5;color:var(--dkblue)}
.ptable tr:nth-child(even) td{background:#fafcff}

/* success banner */
.success-banner{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#e8f5e9,#f1f8f5);border:1.5px solid #81c784;border-radius:11px;padding:14px 16px;margin-bottom:14px;color:#2e7d32}
.success-banner b{color:#1b5e20;font-family:var(--head);font-size:16px}
.close-btn{background:none;border:none;font-size:18px;color:#81c784;cursor:pointer;padding:0;line-height:1;font-weight:900}
.close-btn:hover{color:#2e7d32}

/* ---------- notes ---------- */
.notes-sec{margin-top:22px;padding-top:18px;border-top:1.5px solid #eef1f5}
.notes-in{width:100%;padding:12px 14px;border:1.5px solid #d4ddea;border-radius:10px;font-size:15px;
  font-family:var(--base);color:var(--dkblue);background:#fff;resize:vertical;min-height:80px;line-height:1.4}
.notes-in:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--xltblue)}

.skill-view{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #e7edf5;border-radius:12px;padding:12px 14px;margin-bottom:9px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
<div class="topbar">
  <div class="brand" onclick="go('home')" style="cursor:pointer"><span class="dot"></span><span style="color:#fff">VOC</span><span style="color:var(--medgreen)">CONNECT</span><small>Red Oak</small></div>
  <div class="spacer"></div>

</div>

<script>
  // Connect to Google Sheets backend
const API_URL = "https://script.google.com/macros/s/AKfycbzVXfjxipywJsiJpvS48cwm94cXpgEemlYtu5noTGI3bkFUvFk99NE6GhzsS75vODMQ5Q/exec";
let LIB = {students:[], physicalBoxes:[], rubrics:[]};

// Load data from Google Sheets on startup
async function loadDataFromBackend() {
  try {
    // Fetch rubrics (which includes skills)
    const rubRes = await fetch(API_URL + "?action=getRubrics");
    const rubData = await rubRes.json();
    LIB.rubrics = rubData.rubrics || [];
    
    // Fetch boxes
    const boxRes = await fetch(API_URL + "?action=getBoxes");
    const boxData = await boxRes.json();
    LIB.physicalBoxes = boxData.boxes || [];
    
    // Fetch students
    const stuRes = await fetch(API_URL + "?action=getStudents");
    const stuData = await stuRes.json();
    LIB.students = stuData.students || [];
    
    console.log("✓ Data loaded from Google Sheets");
    initializeRoster();
    render(); // Re-render with loaded data
  } catch (err) {
    console.error("Failed to load data:", err);
    alert("Could not connect to backend. Check your API URL.");
  }
}

loadDataFromBackend();
  // Prompt for evaluator name on first load
function promptForEvaluatorName() {
  const saved = localStorage.getItem('evaluatorName');
  if (saved) {
    console.log('✓ Evaluator: ' + saved);
    return;
  }
  
  const name = prompt('What is your name? (This is saved for future sessions)');
  if (name && name.trim()) {
    localStorage.setItem('evaluatorName', name.trim());
    console.log('✓ Name saved: ' + name);
  }
}

promptForEvaluatorName();
</script>
<script>
/* ============ in-memory store (Phase 2 swaps this for Google Sheet) ============ */
const Store = (()=>{
  const sessions=[];
  return {
    save(s){ s.id='s'+(sessions.length+1); s.savedAt=new Date(); sessions.unshift(s); return s; },
    recent(){ return sessions; }
  };
})();

/* Load students from Google Sheets */
let ROSTER = [];

// Populate ROSTER from the Students sheet data (already loaded in LIB)
function initializeRoster() {
  ROSTER = LIB.students.map(s => ({
    id: s.id,
    name: s.name,
    studentId: s.id,
    group: s.group || 'All',
    active: s.active
  }));
}

// Initialize roster after data loads

const SCALE_GROUP={0:'g0',1:'g1',2:'g2',3:'g3',4:'g4',5:'g5'};
const LVL=[
  {p:'Not Displayed', s:''},
  {p:'Full Physical',  s:''},
  {p:'Model/Partial',  s:'Physical'},
  {p:'Verbal',    s:''},
  {p:'Gestural/Visual',    s:''},
  {p:'Independent',   s:''},
];
const $=s=>document.querySelector(s);
const app=$('#app'), savebar=$('#savebar');
const initials=n=>n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const esc=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const state={screen:'home',student:null,box:null,rubric:null,scores:{},sessionNotes:''};

function boxRubrics(box){ return box.rubricIds.map(id=>LIB.rubrics.find(r=>r.id===id)).filter(Boolean); }
function activeRubrics(box){ return boxRubrics(box).filter(r=>r.active!==false); }
function activeBoxes(){ return LIB.physicalBoxes.filter(b=>b.active!==false && activeRubrics(b).length>0); }
function go(screen){ state.screen=screen; render(); window.scrollTo({top:0,behavior:'instant'}); }

function crumbs(){
  const parts=[];
  parts.push(`<button class="c" onclick="reset()">Students</button>`);
  if(state.student) parts.push(`<span class="sep">›</span><button class="c" onclick="go('boxes')">${esc(state.student.name)}</button>`);
  if(state.box) parts.push(`<span class="sep">›</span><span class="c muted">${esc(state.box.name)}</span>`);
  if(state.rubric) parts.push(`<span class="sep">›</span><span class="c muted">${esc(state.rubric.skillFocus||state.rubric.boxName)}</span>`);
  return `<div class="crumbs">${parts.join('')}</div>`;
}
window.reset=()=>{state.student=null;state.box=null;state.rubric=null;state.scores={};state.sessionNotes='';go('students');};

function returnToScoringBtn(){
  return `<button class="return-to-scoring-btn" onclick="reset()">← Return to Scoring</button>`;
}

/* ---------------- roster helpers ---------------- */
function activeStudents(){ return ROSTER.filter(s=>s.active!==false); }
function studentById(id){ return ROSTER.find(s=>s.id===id); }
function normalizeGroup(raw){
  let g=(raw||'').trim().replace(/\s+/g,' ');
  if(!g) return '';
  // "102", "room 102", "rm 102", "room102", "#102", "classroom 102" -> "Room 102"
  const m=g.match(/^(?:room|rm\.?|classroom|class|#)?\s*0*(\d{1,4})$/i);
  return m ? 'Room '+m[1] : g;
}
function rosterGroups(){ return [...new Set(ROSTER.map(s=>normalizeGroup(s.group)).filter(Boolean))].sort(); }

/* ---------------- screens ---------------- */
function renderHome(){
  app.innerHTML=`<div class="fade">
    <div class="home-hero">
      <h1 class="head" style="font-size:48px;color:var(--dkblue);margin:0 0 8px;letter-spacing:.5px">Ready to Record Skills?</h1>
      <p style="font-size:16px;color:var(--gray);margin:0;line-height:1.6">Use this tool to collect task box assessment data for your students. Below is the scoring scale you'll be using.</p>
    </div>
    
    <div style="background:#fff;border:1.5px solid #e7edf5;border-radius:14px;padding:24px;margin-bottom:24px">
      <h2 class="head" style="font-size:20px;color:var(--dkblue);margin:0 0 16px">6-Level Scoring Scale</h2>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
        <div style="background:var(--xltgray);border:1.5px solid #e2e8f1;border-radius:11px;padding:10px;text-align:center">
          <div style="font-family:var(--head);font-size:24px;color:#595959;line-height:1">0</div>
          <div style="font-weight:700;font-size:11px;color:var(--dkblue);margin-top:4px;line-height:1.3">Not Displayed</div>
        </div>
        <div style="background:#d7f3ff;border:1.5px solid #b3ddf5;border-radius:11px;padding:10px;text-align:center">
          <div style="font-family:var(--head);font-size:24px;color:var(--blue);line-height:1">1</div>
          <div style="font-weight:700;font-size:11px;color:var(--dkblue);margin-top:4px;line-height:1.3">Full Physical</div>

          <div style="font-family:var(--head);font-size:24px;color:var(--blue);line-height:1">2</div>

      <ul style="margin:0;padding:0 0 0 20px;font-size:14px;color:var(--gray);line-height:1.7">
        <li>Select a student and task box to begin</li>
        <li>Rate each skill using the 0–5 scale above</li>
        <li>Add notes if helpful (optional)</li>
        <li>Scores are saved to your secure workspace</li>
      </ul>
    </div>

    <button class="return-to-scoring-btn" onclick="go('students')" style="margin:0;font-size:18px;padding:16px 24px">Start Recording Data →</button>
  </div>`;
  savebar.innerHTML='';
}

function renderStudents(){
  const groups=rosterGroups();
  const g=state.studentGroup||'All';
  const list=activeStudents().filter(s=>g==='All'||normalizeGroup(s.group)===g)
    .sort((a,b)=>a.name.localeCompare(b.name));
  const cards=list.map(s=>`<button class="card student-card" onclick="pickStudent('${s.id}')">

  const chips=groups.length?`<div class="chips">${['All',...groups].map(x=>`<button class="chip${x===g?' on':''}" onclick="state.studentGroup='${esc(x)}';renderStudents()">${esc(x)}</button>`).join('')}</div>`:'';

    <div class="demo-banner"><b>Preview</b> These are fictional sample names, kept in memory only — no real student data is shown or stored here. Real rosters load from your Google Sheet in Phase 2.</div>

}
window.pickStudent=id=>{state.student=studentById(id);state.box=null;state.rubric=null;go('boxes');};

function renderBoxes(){
  const cards=activeBoxes().map(b=>{
    const rs=activeRubrics(b);const n=rs.length;
    const calls=[...new Set(rs.map(r=>r.callNumber))];
    const tag=n>1?`<span class="tag multi">${n} rubrics</span>`:`<span class="tag blue">${calls[0]}</span>`;
    return `<button class="card" data-name="${esc(b.name.toLowerCase())} ${calls.join(' ').toLowerCase()}" onclick="pickBox('${b.id}')">
      <span class="name">${esc(b.name)}</span>
      <span class="meta">${calls.join(' · ')}</span>${tag}</button>`;}).join('');
  app.innerHTML=`<div class="fade">${crumbs()}
    <h1 class="screen-title">Choose a task box</h1>
    <p class="screen-sub">Tap the box ${esc(state.student.name)} is working from. Boxes with more than one rubric let you pick next.</p>

}
window.filterBoxes=v=>{v=v.toLowerCase();document.querySelectorAll('#boxGrid .card').forEach(c=>{c.style.display=c.dataset.name.includes(v)?'':'none';});};
window.pickBox=id=>{state.box=LIB.physicalBoxes.find(b=>b.id===id);const rs=activeRubrics(state.box);
  if(rs.length===1){startRubric(rs[0]);}else{state.rubric=null;go('rubric');}};

function renderRubric(){
  const rs=activeRubrics(state.box);
  const opts=rs.map(r=>{
    const cls=(r.type||'Single').toLowerCase();
    const isDraft=r.published===false;
    return `<button class="rubric-opt${isDraft?' disabled':''}" ${isDraft?'disabled':''}onclick="startRubric(LIB.rubrics.find(x=>x.id==='${r.id}'))" title="${isDraft?'This rubric is in draft mode and is not yet ready for scoring':''}">
      <span class="pill ${cls}">${esc(r.type||'Single')}${isDraft?' · DRAFT':''}</span>
      <span><span class="focus">${esc(r.skillFocus||r.boxName)}</span><br>
      <span class="sub">${esc(r.callNumber)} · ${r.skills.length} skills${isDraft?' · Not published':''}}</span></span>
      <span class="arrow">›</span></button>`;}).join('');
  app.innerHTML=`<div class="fade">${crumbs()}
    <h1 class="screen-title">Which rubric?</h1>
    <p class="screen-sub">${esc(state.box.name)} has ${rs.length} rubrics on this box — choose the one you're scoring.</p>
    ${opts}</div>`;
  savebar.innerHTML='';
}
window.startRubric=r=>{state.rubric=r;state.scores={};state.sessionNotes='';go('score');};

function skillControls(sk){
  const v=state.scores[sk.id];
  const na=v==='NA';
  const lvls=[0,1,2,3,4,5].map(n=>`<button class="lvl ${v===n?'sel '+SCALE_GROUP[n]:''}" onclick="setScore('${sk.id}',${n})">
      <span class="ln">${n}</span><span class="lp">${LVL[n].p}</span></button>`).join('');
  return `<div class="scale ${na?'naoff':''}">${lvls}</div>
      <div class="skiprow">${na?'<span class="nahint">Not counted in this session\u2019s score</span>':''}
      <button class="skip ${na?'on':''}" onclick="setSkip('${sk.id}')">${na?'\u2713 Not assessed':'Not assessed'}</button></div>`;
}
function renderScore(){
  const r=state.rubric;
  const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const rows=r.skills.map((sk,i)=>{
    const na=state.scores[sk.id]==='NA';
    return `<div class="skill ${na?'isna':''}" data-sid="${esc(sk.id)}"><div class="stext"><span class="snum">${i+1}</span><span>${esc(sk.text)}</span></div>
      ${skillControls(sk)}</div>`;}).join('');
  app.innerHTML=`<div class="fade">${crumbs()}
    <div class="context"><div class="ctitle">${esc(r.skillFocus||r.boxName)}</div>
      <div class="crow"><span>Student <b>${esc(state.student.name)}</b></span>
      <span>${esc(r.callNumber)} ${esc(r.boxName)}</span>
      <span>${esc(r.type||'Single')}</span><span>Date <b>${today}</b></span></div></div>
    ${rows}
    <div class="notes-sec">
      <label class="lbl" style="font-family:var(--head);font-size:18px;letter-spacing:.4px;margin-bottom:8px">Session notes <span style="font-family:var(--base);font-weight:400;font-size:13px;color:#9aa4b2">(optional)</span></label>
      <textarea class="notes-in" placeholder="Observations, context, or behavior notes for this session…" id="sessNotes" oninput="state.sessionNotes=this.value">${esc(state.sessionNotes||'')}</textarea></div></div>`;
  renderSaveBar();
}
window.setScore=(sid,n)=>{state.scores[sid]=(state.scores[sid]===n)?undefined:n;
  if(state.scores[sid]===undefined)delete state.scores[sid];updateSkill(sid);renderSaveBar();};
window.setSkip=sid=>{state.scores[sid]=(state.scores[sid]==='NA')?undefined:'NA';
  if(state.scores[sid]===undefined)delete state.scores[sid];updateSkill(sid);renderSaveBar();};
function updateSkill(sid){
  const r=state.rubric;const idx=r.skills.findIndex(s=>s.id===sid);
  const el=document.querySelectorAll('.skill')[idx];if(!el)return;
  const sk=r.skills[idx];const na=state.scores[sid]==='NA';
  el.className='skill'+(na?' isna':'');
  el.innerHTML=`<div class="stext"><span class="snum">${idx+1}</span><span>${esc(sk.text)}</span></div>${skillControls(sk)}`;
}
function renderSaveBar(){
  const r=state.rubric;
  const vals=Object.values(state.scores);
  const scored=vals.filter(v=>typeof v==='number');
  const skipped=vals.filter(v=>v==='NA').length;
  const resolved=scored.length+skipped;
  const sum=scored.reduce((a,b)=>a+b,0);
  const poss=scored.length*5;
  const avg=scored.length?(sum/scored.length).toFixed(1):'\u2014';
  const left=r.skills.length-resolved;
  savebar.innerHTML=`<div class="inner" style="position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;gap:25px;flex-wrap:wrap">
    <div class="tally"><span>Scored<b>${scored.length}<span style="font-size:14px;color:#aeb6c2">/${r.skills.length}</span></b></span>
    ${skipped?`<span>Skipped<b style="color:var(--orange)">${skipped}</b></span>`:''}
    <span class="sep done"><span>Total<b>${sum}<span style="font-size:14px;color:#aeb6c2">/${poss}</span></b></span></span>
    <span>Avg<b>${avg}</b></span></div>
    <button class="btn save" ${left?'disabled':''} onclick="saveSession()">
      ${left?`${left} skill${left===1?'':'s'} left`:'Save session'}</button></div>`;
}
window.saveSession=async()=>{
  const r=state.rubric;
  const entries=Object.entries(state.scores);
  const scored=entries.filter(([,v])=>typeof v==='number');
  const skipped=entries.filter(([,v])=>v==='NA').length;
  const sum=scored.reduce((a,[,v])=>a+v,0);
  const sess=Store.save({student:state.student.name,box:state.box.name,call:r.callNumber,
    focus:r.skillFocus||r.boxName,type:r.type,total:sum,possible:scored.length*5,
    scoredCount:scored.length,skipped,avg:scored.length?(sum/scored.length).toFixed(1):'\u2014',
    notes:state.sessionNotes.trim(),
    skills:r.skills,
    scores:{...state.scores}});
  
  // Send to Google Sheets backend
  try {
    const evaluatorName = localStorage.getItem('evaluatorName') || 'Unknown';
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'submitSession',
        sessionId: sess.id,
        studentId: state.student.id,
        rubricId: r.id,
        evaluatorName: evaluatorName,
        notes: state.sessionNotes.trim(),
        scores: Object.entries(state.scores).map(([skillId, score]) => ({skillId, score}))
      })
    });
    console.log('✓ Session saved to Google Sheets');
  } catch (err) {
    console.error('Failed to save to backend:', err);
  }
  
  state._last=sess; go('saved');
};

function renderSaved(){
  const s=state._last;
  app.innerHTML=`<div class="fade"><div class="saved-hero">
    <div class="check">✓</div><h2>Session saved</h2>
    <p>${esc(s.student)} · ${esc(s.focus)}</p>
    <p style="margin-top:10px;font-size:26px;font-family:var(--head);color:#fff">${s.total}<span style="color:var(--ltblue);font-size:16px">/${s.possible} · avg ${s.avg}</span></p>
    ${s.skipped?`<p style="margin:6px 0 0;color:var(--ltblue);font-weight:700;font-size:13px">${s.skipped} skill${s.skipped===1?'':'s'} marked not assessed</p>`:''}
    ${s.notes?`<p style="margin:10px 0 0;font-size:13px;color:var(--ltblue);font-style:italic;max-width:400px;line-height:1.4">"${esc(s.notes)}"</p>`:''}
    <div class="mini">
      <button class="btn ghost" onclick="reset()">New student</button>
      <button class="btn ghost" onclick="go('boxes')">Same student, new box</button>
      <button class="btn save" style="box-shadow:none" onclick="printSession()">Print session</button>
      <button class="btn ghost" onclick="go('recent')">View recent</button>
    </div></div>
    <p class="screen-sub" style="text-align:center">In this preview, sessions are kept in memory only. Phase 2 writes each one to your Google Sheet.</p></div>`;
  savebar.innerHTML='';
}
function renderRecent(){
  const list=Store.recent();
  const rows=list.length?list.map((s,i)=>`<button class="recent-row" onclick="viewSession(${i})" style="cursor:pointer;text-align:left">
    <div class="rs">${s.avg}</div>
    <div class="ri"><div class="rt">${esc(s.student)} — ${esc(s.focus)}</div>
    <div class="rm">${esc(s.call)} ${esc(s.box)} · ${s.total}/${s.possible}${s.skipped?` · ${s.skipped} N/A`:''} · ${s.savedAt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}${s.notes?`<br><span style="font-size:11.5px;font-style:italic;color:#9aa4b2">"${esc(s.notes.substring(0,60))}${s.notes.length>60?'…':''}"</span>`:''}</div></div>
    </button>`).join(''):`<div class="empty">No sessions yet this preview. Score one to see it here.</div>`;
  app.innerHTML=`<div class="fade">${crumbs()}
    <h1 class="screen-title">Recent sessions</h1>
    <p class="screen-sub">Tap a session to view details and print. The big number is the session average.</p>
    ${rows}
    <p class="screen-sub" style="margin-top:18px">Phase 3 turns this into real progress &amp; engagement reports by student, group, and box.</p>
    <div style="margin-top:40px">${returnToScoringBtn()}</div></div>`;
  savebar.innerHTML='';
}
$('#navRecent').onclick=()=>go('recent');
$('#navReports').onclick=()=>go('reports');

/* ================= REPORTS ================= */
/* helpers */
function reportStudentSessions(studentName){
  return Store.recent().filter(s=>s.student===studentName).reverse();
}
function reportStudentStats(studentName){
  const sessions=reportStudentSessions(studentName);
  const boxes={};
  sessions.forEach(s=>{
    if(!boxes[s.box])boxes[s.box]={scores:[],sessions:0};
    boxes[s.box].sessions++;
    const scores=Object.values(s.scores).filter(v=>typeof v==='number');
    if(scores.length)boxes[s.box].scores.push(...scores);
  });
  const boxStats={};
  Object.entries(boxes).forEach(([name,data])=>{
    const avg=data.scores.length?((data.scores.reduce((a,b)=>a+b,0)/data.scores.length).toFixed(1)):0;
    boxStats[name]={avg:parseFloat(avg),sessions:data.sessions};
  });
  const allScores=Object.values(boxes).flatMap(b=>b.scores);
  return {
    totalSessions:sessions.length,
    uniqueBoxes:Object.keys(boxes).length,
    overallAvg:allScores.length?((allScores.reduce((a,b)=>a+b,0)/allScores.length).toFixed(1)):0,
    boxStats
  };
}
function reportGroupSessions(group){
  return Store.recent().filter(s=>normalizeGroup(ROSTER.find(r=>r.name===s.student)?.group)===group).reverse();
}
function reportGroupStats(group){
  const sessions=reportGroupSessions(group);
  const students=new Set(sessions.map(s=>s.student));
  const boxes={};
  sessions.forEach(s=>{
    if(!boxes[s.box])boxes[s.box]={scores:[],sessions:0};
    boxes[s.box].sessions++;
    const scores=Object.values(s.scores).filter(v=>typeof v==='number');
    if(scores.length)boxes[s.box].scores.push(...scores);
  });
  const boxStats={};
  Object.entries(boxes).forEach(([name,data])=>{
    const avg=data.scores.length?((data.scores.reduce((a,b)=>a+b,0)/data.scores.length).toFixed(1)):0;
    boxStats[name]={avg:parseFloat(avg),sessions:data.sessions};
  });
  return{totalSessions:sessions.length,uniqueStudents:students.size,boxStats};
}

window.previewBulkImport=()=>{
  const csv=document.getElementById('bulkRubricCsv').value.trim();
  try{
    const rows=parseCSV(csv);
    if(rows.length<2)throw new Error('Need at least a header row and one data row');
    
    const headers=rows[0].map(h=>h.trim().toLowerCase());
    const colIdx={
      call:headers.findIndex(h=>/^call\s*#|callnumber|call_number/.test(h)),
      box:headers.findIndex(h=>/^box\s*name|boxname/.test(h)),
      type:headers.findIndex(h=>/^type|rubric\s*type/.test(h)),
      focus:headers.findIndex(h=>/^skill\s*focus|skillfocus|focus/.test(h))
    };
    
    if(colIdx.call<0||colIdx.box<0||colIdx.type<0||colIdx.focus<0)throw new Error('Missing required columns: Call#, Box Name, Type, Skill Focus');
    
    const skillCols=[];
    headers.forEach((h,i)=>{
      if(i!==colIdx.call&&i!==colIdx.box&&i!==colIdx.type&&i!==colIdx.focus&&h.trim()!==''){
        skillCols.push(i);
      }
    });
    if(skillCols.length===0)throw new Error('No skill columns found. Add columns like "Skill 1", "Skill 2", etc.');
    
    const existing=new Set(LIB.rubrics.map(r=>r.callNumber+'\x00'+r.boxName));
    const newRubrics=[],duplicates=[];
    
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const call=(row[colIdx.call]||'').trim();
      const box=(row[colIdx.box]||'').trim();
      const type=(row[colIdx.type]||'Single').trim();
      const focus=(row[colIdx.focus]||'').trim();
      
      if(!call||!box)continue;
      
      const key=call+'\x00'+box;
      if(existing.has(key)){
        duplicates.push({callNumber:call,boxName:box});
        continue;
      }
      
      const skills=skillCols.map((idx,num)=>{
        const text=(row[idx]||'').trim();
        return text?{id:call+'__s'+(num+1),text}:null;
      }).filter(x=>x);
      
      if(skills.length===0)throw new Error('Row '+(i+1)+': No skills found');
      
      newRubrics.push({
        id:uid('rubric'),callNumber:call,boxName:box,type,skillFocus:focus,
        title:call+' '+box+' — '+focus,physicalBox:box,skills,active:true,published:true
      });
    }
    
    if(newRubrics.length===0)throw new Error('No new rubrics found (all are duplicates or empty)');
    state.importRubricsParsed={new:newRubrics,duplicates};
    renderBulkImport();
  }catch(e){
    alert('Error parsing CSV: '+e.message);
  }
};

window.confirmBulkImport=()=>{
  const {new:newRubrics}=state.importRubricsParsed;
  newRubrics.forEach(r=>{LIB.rubrics.push(r);});

};

/* ---- CSV import ---- */
function parseCSV(text){
  const rows=[];let row=[],field='',q=false;
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else q=false;}else field+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else field+=c;}}
  if(field!==''||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
function mapHeaders(hdr){
  const h=hdr.map(x=>x.trim().toLowerCase());
  const find=re=>h.findIndex(x=>re.test(x));
  return {
    name:find(/^(student ?name|full ?name|name)$/),
    first:find(/^first[ _]?name$/), last:find(/^last[ _]?name$/),
    sid:find(/student[ _]?id|^id$|id ?number/),
    group:find(/group|class|cohort|period|session|teacher/)
  };
}
function parseRoster(text){
  const rows=parseCSV(text); if(rows.length<1)return{students:[],warnings:['File is empty.']};
  const m=mapHeaders(rows[0]); const warnings=[]; const out=[];
  const hasName=m.name>=0||(m.first>=0&&m.last>=0)||m.first>=0;
  if(!hasName){return{students:[],warnings:['Couldn\u2019t find a Name column. Expected a "Student Name" column, or "First Name" + "Last Name".']};}
  for(let i=1;i<rows.length;i++){const r=rows[i];
    let name = m.name>=0 ? (r[m.name]||'').trim()
      : [m.first>=0?r[m.first]:'',m.last>=0?r[m.last]:''].map(x=>(x||'').trim()).filter(Boolean).join(' ');
    if(!name){warnings.push('Row '+(i+1)+' skipped (no name).');continue;}
    out.push({name, studentId:(m.sid>=0?r[m.sid]||'':'').trim(), group:normalizeGroup(m.group>=0?r[m.group]||'':'')});
  }
  return {students:out,warnings};
}

      <label for="csvFile" class="drop-lbl">Choose a CSV file…</label></div>
    <div class="or">or paste CSV text</div>
    <textarea class="in" id="csvPaste" rows="5" placeholder="Student Name,Student ID,Group&#10;Jordan Lee,1007,AM Group" style="resize:vertical;font-family:monospace;font-size:13px"></textarea>
    <button class="btn ghost" style="margin-top:10px" onclick="pasteImport()">Preview pasted CSV</button>
    ${preview}</div>`;
  savebar.innerHTML='';
}
window.fileImport=inp=>{const f=inp.files&&inp.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{state.importParsed=parseRoster(String(rd.result));renderRosterImport();};rd.readAsText(f);};
window.pasteImport=()=>{const t=document.getElementById('csvPaste').value||'';
  if(!t.trim())return;state.importParsed=parseRoster(t);renderRosterImport();};
window.commitImport=()=>{const p=state.importParsed;if(!p||!p.students.length)return;
  let added=0,dupes=0;
  p.students.forEach(s=>{
    const dup=ROSTER.find(x=>(s.studentId&&x.studentId===s.studentId)||(x.name.toLowerCase()===s.name.toLowerCase()&&normalizeGroup(x.group)===normalizeGroup(s.group)));
    if(dup){dupes++;return;}
    ROSTER.push({id:uid('stu'),name:s.name,studentId:s.studentId,group:s.group,active:true});added++;});
  state.importParsed=null;state.importResult={added,dupes};go('roster');
};
window.downloadTemplate=()=>{
  const csv='Student Name,Student ID,Group\nJordan Lee,1007,AM Group\nSam Rivera,1008,PM Group\n';
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='roster_template.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};


function renderBoxEdit(){
  const b=boxById(state.boxId); if(!b){go('admin');return;}
  const rs=boxRubrics(b);
  const rlist=rs.map(r=>{
    const cls=(r.type||'Single').toLowerCase();const arch=r.active===false;
    return `<div class="rub-row${arch?' arch':''}">
      <span class="pill ${cls}">${esc(r.type||'Single')}</span>
      <div class="rr-main"><div class="rr-focus">${esc(r.skillFocus||r.boxName||'(no focus)')}${arch?' <span class="archtag">Archived</span>':''}</div>
      <div class="rr-meta">${esc(r.callNumber||'(no call #)')} \u00b7 ${r.skills.length} skill${r.skills.length===1?'':'s'}</div></div>
      <button class="mini-btn" onclick="editRubric('${r.id}')">Edit</button>
      <button class="mini-btn" onclick="toggleRubric('${r.id}')">${arch?'Restore':'Archive'}</button></div>`;
  }).join('')||`<div class="empty" style="padding:18px 0">No rubrics yet \u2014 add the first one below.</div>`;
  app.innerHTML=`<div class="fade">
    <p class="screen-sub" style="margin-bottom:14px"><button class="linkbtn" onclick="go('admin')">\u2039 All task boxes</button></p>
    <h1 class="screen-title">Edit task box</h1>
    <label class="fld"><span class="lbl">Box name (shelf label)</span>
      <input class="in" value="${esc(b.name)}" oninput="renameBox('${b.id}',this.value)"></label>
    <div class="section-h">Rubrics on this box <span>${rs.length}</span></div>
    <p class="hint" style="margin:-4px 0 12px">A box can hold one rubric, or a Primary + Secondary pair, or several (like the Bolt Board).</p>
    <div class="rub-list">${rlist}</div>
    <button class="btn ghost" style="margin-top:6px" onclick="addRubric('${b.id}')">+ Add rubric</button>
    <div class="danger-zone">
      ${b.active===false
        ? `<button class="mini-btn" onclick="setBoxActive('${b.id}',true)">Restore box</button>`
        : `<button class="mini-btn danger" onclick="setBoxActive('${b.id}',false)">Archive this box</button>`}
      ${rs.length===0?`<button class="mini-btn danger" onclick="deleteBox('${b.id}')">Delete empty box</button>`:''}
    </div>
    <div style="height:18px"></div>
    <button class="btn save" onclick="go('admin')">Done</button></div>`;
  savebar.innerHTML='';
}
window.renameBox=(id,v)=>{const b=boxById(id);b.name=v;boxRubrics(b).forEach(r=>{r.physicalBox=v;});};
window.setBoxActive=(id,a)=>{boxById(id).active=a;renderBoxEdit();};
window.deleteBox=id=>{if(!confirm('Delete this empty box? This cannot be undone.'))return;LIB.physicalBoxes=LIB.physicalBoxes.filter(b=>b.id!==id);go('admin');};
window.toggleRubric=rid=>{const r=rubById(rid);r.active=(r.active===false);renderBoxEdit();};
window.addRubric=bid=>{const b=boxById(bid);
  state.rubricDraft={id:null,boxId:bid,callNumber:'',boxName:b.name,type:'Single',skillFocus:'',skills:[{id:uid('sk'),text:''}]};
  go('rubricEdit');};
window.editRubric=rid=>{const r=rubById(rid);const b=LIB.physicalBoxes.find(x=>x.rubricIds.includes(rid));
  state.rubricDraft={id:r.id,boxId:b?b.id:state.boxId,callNumber:r.callNumber,boxName:r.boxName,type:r.type||'Single',
    skillFocus:r.skillFocus||'',skills:r.skills.map(s=>({id:s.id,text:s.text}))};
  go('rubricEdit');};

function renderRubricEdit(){
  const d=state.rubricDraft;
  const typeBtns=['Single','Primary','Secondary'].map(t=>`<button class="seg${d.type===t?' on':''}" onclick="draftType('${t}')">${t}</button>`).join('');
  const skills=d.skills.map((s,i)=>`<div class="sk-row">
    <span class="sk-num">${i+1}</span>
    <textarea class="sk-in" rows="1" oninput="draftSkill(${i},this.value);autogrow(this)" placeholder="Describe the skill\u2026">${esc(s.text)}</textarea>
    <div class="sk-actions">
      <button class="mini-btn"${i===0?' disabled':''} onclick="moveSkill(${i},-1)" title="Move up">\u2191</button>
      <button class="mini-btn"${i===d.skills.length-1?' disabled':''} onclick="moveSkill(${i},1)" title="Move down">\u2193</button>
      <button class="mini-btn danger"${d.skills.length===1?' disabled':''} onclick="delSkill(${i})" title="Delete">\u2715</button></div></div>`).join('');
  app.innerHTML=`<div class="fade">
    <p class="screen-sub" style="margin-bottom:14px"><button class="linkbtn" onclick="go('boxEdit')">\u2039 Back to box</button></p>
    <h1 class="screen-title">${d.id?'Edit rubric':'New rubric'}</h1>
    <div class="title-prev">Title preview: <b id="titlePreview">${esc(titleOf(d))||'\u2014'}</b></div>
    <div class="grid2">
      <label class="fld"><span class="lbl">Call # (as printed on box)</span>
        <input class="in" value="${esc(d.callNumber)}" oninput="draftSet('callNumber',this.value)" placeholder="e.g. MAT-105"></label>
      <label class="fld"><span class="lbl">Box name</span>
        <input class="in" value="${esc(d.boxName)}" oninput="draftSet('boxName',this.value)" placeholder="e.g. Washers"></label></div>
    <label class="fld"><span class="lbl">Rubric type</span><div class="seg-wrap">${typeBtns}</div>
      <span class="hint">Use Primary (assembly) + Secondary (disassembly) when one box has two rubrics.</span></label>
    <label class="fld"><span class="lbl">Status</span>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="seg ${d.published===false?'':'on'}" onclick="draftSet('published',true)">Published</button>
        <button class="seg ${d.published===false?'on':''}" onclick="draftSet('published',false)">Draft</button>
        <span class="hint" style="margin:0">${d.published===false?'Instructors can view but cannot score this rubric.':'Instructors can score with this rubric.'}</span>
      </div></label>
    <label class="fld"><span class="lbl">Skill focus <span style="font-weight:400;color:#9aa4b2">(the descriptor after the \u2014)</span></span>
      <input class="in" value="${esc(d.skillFocus)}" oninput="draftSet('skillFocus',this.value)" placeholder="e.g. Size Sorting & Grasp"></label>
    <div class="section-h">Skills <span>${d.skills.length}</span></div>
    <p class="hint" style="margin:-4px 0 10px">Every skill is scored on the shared 0\u20135 scale. Reorder with the arrows.</p>
    <div class="sk-list">${skills}</div>
    <button class="btn ghost" style="margin-top:8px" onclick="addSkill()">+ Add skill</button>
    <div class="err" id="rubErr"></div>
    <div class="edit-actions">
      <button class="btn ghost" onclick="go('boxEdit')">Cancel</button>
      <button class="btn save" onclick="saveRubric()">Save rubric</button></div></div>`;
  savebar.innerHTML='';
  document.querySelectorAll('.sk-in').forEach(el=>autogrow(el));
}
window.autogrow=el=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};
window.draftSet=(k,v)=>{state.rubricDraft[k]=v;const t=document.getElementById('titlePreview');if(t)t.textContent=titleOf(state.rubricDraft)||'\u2014';};
window.draftType=t=>{state.rubricDraft.type=t;renderRubricEdit();};
window.draftSkill=(i,v)=>{state.rubricDraft.skills[i].text=v;};
window.moveSkill=(i,dir)=>{const s=state.rubricDraft.skills;const j=i+dir;if(j<0||j>=s.length)return;[s[i],s[j]]=[s[j],s[i]];renderRubricEdit();};
window.delSkill=i=>{if(state.rubricDraft.skills.length===1)return;state.rubricDraft.skills.splice(i,1);renderRubricEdit();};
window.addSkill=()=>{state.rubricDraft.skills.push({id:uid('sk'),text:''});renderRubricEdit();
  const ins=document.querySelectorAll('.sk-in');const last=ins[ins.length-1];if(last)last.focus();};
window.saveRubric=()=>{
  const d=state.rubricDraft;const errs=[];
  if(!d.callNumber.trim())errs.push('Call # is required.');
  const skills=d.skills.map(s=>({id:s.id,text:s.text.trim()})).filter(s=>s.text);
  if(!skills.length)errs.push('Add at least one skill.');
  if(errs.length){const e=document.getElementById('rubErr');e.textContent=errs.join(' ');e.style.display='block';return;}
  const title=titleOf(d);const box=boxById(d.boxId);
  if(d.id){const r=rubById(d.id);
    Object.assign(r,{callNumber:d.callNumber.trim(),boxName:d.boxName.trim(),type:d.type,skillFocus:d.skillFocus.trim(),title,skills});
  }else{const nid=uid('rub');
    LIB.rubrics.push({id:nid,callNumber:d.callNumber.trim(),boxName:d.boxName.trim(),type:d.type,skillFocus:d.skillFocus.trim(),
      title,physicalBox:box?box.name:d.boxName.trim(),skills,active:true});
    if(box&&!box.rubricIds.includes(nid))box.rubricIds.push(nid);}
  go('boxEdit');
};


function render(){
  ({home:renderHome,students:renderStudents,boxes:renderBoxes,rubric:renderRubric,
    score:renderScore,saved:renderSaved,recent:renderRecent,viewSession:renderViewSession,
    reports:renderReports,reportStudent:renderReportStudent,reportGroup:renderReportGroup,
    admin:renderAdmin,bulkImport:renderBulkImport,boxEdit:renderBoxEdit,rubricEdit:renderRubricEdit,
    roster:renderRoster,studentEdit:renderStudentEdit,rosterImport:renderRosterImport}[state.screen])();
}
$('#navManage').onclick=()=>go('admin');
render();
</script>
</body>
</html>
